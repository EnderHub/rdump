name: rdump-mcp

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate generated docs
        run: ./scripts/regenerate-generated-docs.sh
      - name: Verify generated docs are committed
        run: git diff --exit-code -- docs/generated
      - name: Run tests
        run: |
          cargo test --workspace
          cargo test -p rdump --features async

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        run: |
          cargo build --release -p rdump -p rdump-mcp
      - name: Smoke-check release binaries
        run: |
          ./target/release/rdump --help
          ./target/release/rdump search --help
          ./target/release/rdump-mcp --help

  perf-review:
    name: perf-review
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      RDUMP_PERF_METADATA_MAX_MS: "1500"
      RDUMP_PERF_SEMANTIC_MAX_MS: "2500"
      RDUMP_PERF_MIXED_MAX_MS: "3000"
      RDUMP_PERF_PATH_MAX_MS: "1200"
      RDUMP_PERF_HIGHLIGHT_WARM_MAX_MS: "500"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run ignored performance harnesses
        run: |
          cargo test -p rdump --test perf_smoke -- --ignored
          cargo test -p rdump --test highlight_perf -- --ignored

  publish:
    name: publish
    needs: [test, smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            bin_ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            bin_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            bin_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Regenerate generated docs
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/regenerate-generated-docs.sh
      - name: Verify generated docs are committed
        if: matrix.os == 'ubuntu-latest'
        run: git diff --exit-code -- docs/generated
      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p rdump -p rdump-mcp
      - name: Package release (unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rdump${{ matrix.bin_ext }} dist/rdump${{ matrix.bin_ext }}
          cp target/${{ matrix.target }}/release/rdump-mcp${{ matrix.bin_ext }} dist/rdump-mcp${{ matrix.bin_ext }}
          tar -czf dist/rdump-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} -C dist rdump${{ matrix.bin_ext }}
          tar -czf dist/rdump-mcp-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} -C dist rdump-mcp${{ matrix.bin_ext }}
      - name: Package release (windows)
        if: matrix.archive_ext == 'zip'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rdump${{ matrix.bin_ext }} dist/rdump${{ matrix.bin_ext }}
          cp target/${{ matrix.target }}/release/rdump-mcp${{ matrix.bin_ext }} dist/rdump-mcp${{ matrix.bin_ext }}
          7z a dist/rdump-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} ./dist/rdump${{ matrix.bin_ext }}
          7z a dist/rdump-mcp-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} ./dist/rdump-mcp${{ matrix.bin_ext }}
      - name: Publish to crates.io
        if: matrix.os == 'ubuntu-latest'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          crate_version() {
            local manifest="$1"
            grep '^version = ' "$manifest" | head -n1 | sed -E 's/version = "([^"]+)"/\1/'
          }

          crate_published() {
            local crate="$1"
            local version="$2"
            curl -fsS "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null 2>&1
          }

          publish_with_retry() {
            local crate="$1"
            local version="$2"
            local attempts=10

            if crate_published "$crate" "$version"; then
              echo "${crate} ${version} is already published; skipping."
              return 0
            fi

            for attempt in $(seq 1 "$attempts"); do
              if cargo publish -p "$crate" --locked; then
                echo "Published ${crate} ${version}."
                return 0
              fi
              echo "${crate} publish attempt ${attempt}/${attempts} failed; retrying in 20s..."
              sleep 20
            done

            echo "Failed to publish ${crate} ${version} after ${attempts} attempts."
            return 1
          }

          RDUMP_CONTRACTS_VERSION=$(crate_version crates/rdump-contracts/Cargo.toml)
          RDUMP_VERSION=$(crate_version crates/rdump/Cargo.toml)
          RDUMP_MCP_VERSION=$(crate_version crates/rdump-mcp/Cargo.toml)

          publish_with_retry rdump-contracts "$RDUMP_CONTRACTS_VERSION"
          publish_with_retry rdump "$RDUMP_VERSION"
          publish_with_retry rdump-mcp "$RDUMP_MCP_VERSION"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
